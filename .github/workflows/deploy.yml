name: Deploy to production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/646689989034/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deployer@second-academy-418617.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project second-academy-418617
